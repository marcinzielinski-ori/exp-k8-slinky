#!/usr/bin/env -S ansible-playbook -vv
---
# Phase 05 — Ingress and TLS
# Components: cert-manager, ingress-nginx (hostNetwork on control plane)
# Steps: preflight → helm → cert-manager → ingress-nginx

- name: "05-1 | Preflight — check cluster from control plane"
  hosts: control_plane
  gather_facts: false
  vars:
    kube: kubectl
    kubeconfig: /etc/kubernetes/admin.conf
  tasks:
    - name: Check all nodes are Ready
      ansible.builtin.command: "{{ kube }} --kubeconfig {{ kubeconfig }} get nodes -o wide"
      register: nodes_out
      changed_when: false

    - ansible.builtin.debug:
        msg: "{{ nodes_out.stdout_lines }}"

    - name: Fail if any node is NotReady
      ansible.builtin.command: >
        {{ kube }} --kubeconfig {{ kubeconfig }} get nodes --no-headers
      register: nodes_raw
      failed_when: "'NotReady' in nodes_raw.stdout"
      changed_when: false


- name: "05-2 | Install Helm on control plane"
  hosts: control_plane
  gather_facts: false
  tasks:
    - name: Install Helm binary
      ansible.builtin.shell:
        cmd: curl -sfL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        creates: /usr/local/bin/helm

    - name: Confirm helm version
      ansible.builtin.command: helm version --short
      register: helm_ver
      changed_when: false

    - ansible.builtin.debug:
        msg: "helm {{ helm_ver.stdout }}"


- name: "05-3 | Install cert-manager"
  hosts: control_plane
  gather_facts: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tasks:
    - name: Add jetstack Helm repo
      ansible.builtin.command: helm repo add jetstack https://charts.jetstack.io --force-update
      changed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Install cert-manager via Helm
      ansible.builtin.command: >
        helm upgrade --install cert-manager jetstack/cert-manager
        --namespace cert-manager --create-namespace
        --version {{ cert_manager_version }}
        --set installCRDs=true
        --wait --timeout 5m
      register: cm_out
      changed_when: "'already up-to-date' not in cm_out.stdout"

    - name: Wait for cert-manager deployments to roll out
      ansible.builtin.command: >
        kubectl rollout status
        deployment/{{ item }} -n cert-manager --timeout=3m
      loop: [cert-manager, cert-manager-webhook, cert-manager-cainjector]
      changed_when: false


- name: "05-4 | Install ingress-nginx (hostNetwork, pinned to control plane)"
  hosts: control_plane
  gather_facts: true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tasks:
    - name: Add ingress-nginx Helm repo
      ansible.builtin.command: >
        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx --force-update
      changed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Install ingress-nginx via Helm (hostNetwork on control plane)
      ansible.builtin.command: >
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
        --namespace ingress-nginx --create-namespace
        --set controller.hostNetwork=true
        --set controller.hostPort.enabled=true
        --set controller.service.type=ClusterIP
        --set controller.nodeSelector."kubernetes\.io/hostname"=mzcl01-cp
        --set controller.tolerations[0].key=node-role.kubernetes.io/control-plane
        --set controller.tolerations[0].operator=Exists
        --set controller.tolerations[0].effect=NoSchedule
        --wait --timeout 5m
      register: nginx_out
      changed_when: "'already up-to-date' not in nginx_out.stdout"

    - ansible.builtin.debug:
        msg: "{{ nginx_out.stdout_lines }}"

    - name: Verify ingress-nginx controller is running
      ansible.builtin.command: >
        kubectl get pods -n ingress-nginx
        -l app.kubernetes.io/component=controller -o wide
      register: nginx_pods
      changed_when: false

    - ansible.builtin.debug:
        msg: "{{ nginx_pods.stdout_lines }}"

    - name: Print access info
      ansible.builtin.debug:
        msg:
          - "ingress-nginx is listening on: https://{{ ansible_lima0.ipv4.address }}"
          - "Add to macOS /etc/hosts: {{ ansible_lima0.ipv4.address }}  <your-hostname>"
          - "kubectl --kubeconfig ~/.kube/k8s-local.yaml get ingress -A"
