all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_become: false
  children:
    control_plane:
      hosts:
        mzcl01-cp:
          ansible_host: lima-mzcl01-cp
          ansible_ssh_common_args: "-F {{ lookup('env', 'HOME') }}/.lima/mzcl01-cp/ssh.config"

    workers:
      hosts:
        mzcl01-w1:
          ansible_host: lima-mzcl01-w1
          ansible_ssh_common_args: "-F {{ lookup('env', 'HOME') }}/.lima/mzcl01-w1/ssh.config"
        mzcl01-w2:
          ansible_host: lima-mzcl01-w2
          ansible_ssh_common_args: "-F {{ lookup('env', 'HOME') }}/.lima/mzcl01-w2/ssh.config"
        mzcl01-w3:
          ansible_host: lima-mzcl01-w3
          ansible_ssh_common_args: "-F {{ lookup('env', 'HOME') }}/.lima/mzcl01-w3/ssh.config"

    slurm_login_nodes:
      hosts:
        mzcl01-sllogin1:
          ansible_host: lima-mzcl01-sllogin1
          ansible_ssh_common_args: "-F {{ lookup('env', 'HOME') }}/.lima/mzcl01-sllogin1/ssh.config"

  vars:
    ansible_become: true
    ansible_become_method: sudo
