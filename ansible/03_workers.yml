#!/usr/bin/env -S ansible-playbook -vv
---
# Phase 03 — RKE2 Worker Nodes
# Steps: load-credentials → system-prep → install-agent → start-agent → verify-join

- name: "03-1 | Load join credentials from phase 02"
  hosts: localhost
  gather_facts: false
  become: false
  tasks:
    - name: Load RKE2 join vars
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/output/rke2_join_vars.yml"

    - ansible.builtin.debug:
        msg: "Joining workers to {{ rke2_server_url }}"


- name: "03-2 | System prep — worker nodes"
  hosts: workers
  gather_facts: true
  tasks:
    - name: Disable swap (runtime)
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap entries from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '.*\bswap\b.*'
        state: absent

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop: [overlay, br_netfilter]

    - name: Persist kernel modules across reboots
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: "overlay\nbr_netfilter\n"
        mode: '0644'

    - name: Apply sysctl settings for Kubernetes
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-k8s.conf
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward,                 value: "1" }


- name: "03-3 | Install and configure RKE2 agent"
  hosts: workers
  gather_facts: true
  tasks:
    - name: Install RKE2 agent binary
      ansible.builtin.shell:
        cmd: curl -sfL https://get.rke2.io | INSTALL_RKE2_TYPE=agent sh -
        creates: /usr/local/bin/rke2

    - name: Create RKE2 config directory
      ansible.builtin.file:
        path: /etc/rancher/rke2
        state: directory
        mode: '0755'

    - name: Write RKE2 agent config
      ansible.builtin.copy:
        dest: /etc/rancher/rke2/config.yaml
        mode: '0640'
        content: |
          server: {{ hostvars['localhost']['rke2_server_url'] }}
          token:  {{ hostvars['localhost']['rke2_join_token'] }}
          node-ip: {{ ansible_lima0.ipv4.address }}
          node-name: {{ inventory_hostname }}
          kubelet-arg:
            - node-status-update-frequency=10s

    - name: Enable and start rke2-agent service
      ansible.builtin.systemd:
        name: rke2-agent
        enabled: true
        state: started


- name: "03-4 | Verify worker nodes joined the cluster"
  hosts: localhost
  gather_facts: false
  become: false
  tasks:
    - name: Wait for each worker node to appear and reach Ready
      ansible.builtin.command:
        cmd: kubectl --kubeconfig {{ kubeconfig }} get node {{ item }}
      register: node_check
      until: "'Ready' in node_check.stdout"
      retries: 18
      delay: 10
      loop: [mzcl01-w1, mzcl01-w2]
      changed_when: false

    - name: Show final cluster node status
      ansible.builtin.command:
        cmd: kubectl --kubeconfig {{ kubeconfig }} get nodes -o wide
      register: nodes_out
      changed_when: false

    - ansible.builtin.debug:
        msg: "{{ nodes_out.stdout_lines }}"
