#!/usr/bin/env -S ansible-playbook -vv
---
# Phase 05 — Rancher UI
# Steps: preflight → install-helm → cert-manager → rancher

- name: "05-1 | Preflight — check cluster from control plane"
  hosts: control_plane
  gather_facts: false
  vars:
    kube: /var/lib/rancher/rke2/bin/kubectl
    kubeconfig: /etc/rancher/rke2/rke2.yaml
  tasks:
    - name: Check all nodes are Ready
      ansible.builtin.command: "{{ kube }} --kubeconfig {{ kubeconfig }} get nodes -o wide"
      register: nodes_out
      changed_when: false

    - ansible.builtin.debug:
        msg: "{{ nodes_out.stdout_lines }}"

    - name: Check no nodes NotReady
      ansible.builtin.command: >
        {{ kube }} --kubeconfig {{ kubeconfig }} get nodes --no-headers
      register: nodes_raw
      failed_when: "'NotReady' in nodes_raw.stdout"
      changed_when: false


- name: "05-2 | Install Helm on control plane"
  hosts: control_plane
  gather_facts: false
  tasks:
    - name: Install Helm binary
      ansible.builtin.shell:
        cmd: curl -sfL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        creates: /usr/local/bin/helm

    - name: Confirm helm version
      ansible.builtin.command: helm version --short
      register: helm_ver
      changed_when: false

    - ansible.builtin.debug:
        msg: "helm {{ helm_ver.stdout }}"


- name: "05-3 | Install cert-manager"
  hosts: control_plane
  gather_facts: false
  vars:
    kubeconfig: /etc/rancher/rke2/rke2.yaml
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
  tasks:
    - name: Add jetstack Helm repo
      ansible.builtin.command: helm repo add jetstack https://charts.jetstack.io --force-update
      changed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Install cert-manager via Helm
      ansible.builtin.command: >
        helm upgrade --install cert-manager jetstack/cert-manager
        --namespace cert-manager --create-namespace
        --version {{ cert_manager_version }}
        --set installCRDs=true
        --wait --timeout 5m
      register: cm_out
      changed_when: "'already up-to-date' not in cm_out.stdout"

    - name: Wait for cert-manager deployments to roll out
      ansible.builtin.command: >
        /var/lib/rancher/rke2/bin/kubectl rollout status
        deployment/{{ item }} -n cert-manager --timeout=3m
      loop: [cert-manager, cert-manager-webhook, cert-manager-cainjector]
      changed_when: false


- name: "05-4 | Install Rancher"
  hosts: control_plane
  gather_facts: true
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
  tasks:
    - name: Add rancher Helm repo
      ansible.builtin.command: >
        helm repo add rancher-latest https://releases.rancher.com/server-charts/latest --force-update
      changed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Create cattle-system namespace
      ansible.builtin.command: >
        /var/lib/rancher/rke2/bin/kubectl create namespace {{ rancher_namespace }}
      register: ns_out
      failed_when: ns_out.rc != 0 and 'already exists' not in ns_out.stderr
      changed_when: ns_out.rc == 0

    - name: Install Rancher via Helm
      ansible.builtin.command: >
        helm upgrade --install rancher rancher-latest/rancher
        --namespace {{ rancher_namespace }}
        --set hostname={{ rancher_hostname }}
        --set bootstrapPassword=admin
        --set replicas=1
        --set ingress.tls.source=rancher
        --set global.cattle.psp.enabled=false
        --wait --timeout 10m
      register: rancher_out
      changed_when: "'already up-to-date' not in rancher_out.stdout"

    - ansible.builtin.debug:
        msg:
          - "Rancher UI:  https://{{ rancher_hostname }}"
          - "Alt URL:     https://{{ ansible_lima0.ipv4.address }}"
          - "Username:    admin / Password: admin (change on first login)"
