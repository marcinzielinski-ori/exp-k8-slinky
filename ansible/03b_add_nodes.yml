#!/usr/bin/env -S ansible-playbook -vv
---
# Phase 03b — Add new nodes to existing RKE2 cluster
# Joins mzcl01-w3 (worker) and mzcl01-sllogin1 (dedicated slurm-login node)
# Steps: load-join-vars → system-prep → install-agent → start → label+taint

- name: "03b-1 | Load join vars on localhost"
  hosts: localhost
  gather_facts: false
  become: false
  tasks:
    - name: Load RKE2 join vars from phase 02 output
      ansible.builtin.include_vars:
        file: "{{ output_dir }}/rke2_join_vars.yml"


- name: "03b-2 | System prep — new nodes"
  hosts: workers:slurm_login_nodes
  gather_facts: true
  tasks:
    - name: Disable swap (runtime)
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap entries from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '.*\bswap\b.*'
        state: absent

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop: [overlay, br_netfilter]

    - name: Persist kernel modules across reboots
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: "overlay\nbr_netfilter\n"
        mode: '0644'

    - name: Apply sysctl settings for Kubernetes
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-k8s.conf
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward,                 value: "1" }


- name: "03b-3 | Install and configure RKE2 agent on new nodes"
  hosts: workers:slurm_login_nodes
  gather_facts: true
  tasks:
    - name: Install RKE2 agent binary
      ansible.builtin.shell:
        cmd: curl -sfL https://get.rke2.io | INSTALL_RKE2_TYPE=agent sh -
        creates: /usr/local/bin/rke2

    - name: Create RKE2 config directory
      ansible.builtin.file:
        path: /etc/rancher/rke2
        state: directory
        mode: '0755'

    - name: Write RKE2 agent config
      ansible.builtin.copy:
        dest: /etc/rancher/rke2/config.yaml
        mode: '0640'
        content: |
          server: {{ hostvars['localhost']['rke2_server_url'] }}
          token: {{ hostvars['localhost']['rke2_join_token'] }}
          node-ip: {{ ansible_lima0.ipv4.address }}
          node-name: {{ inventory_hostname }}

    - name: Enable and start rke2-agent service
      ansible.builtin.systemd:
        name: rke2-agent
        enabled: true
        state: started


- name: "03b-4 | Wait for new nodes to become Ready"
  hosts: control_plane
  gather_facts: false
  vars:
    kube: /var/lib/rancher/rke2/bin/kubectl
    kubeconfig: /etc/rancher/rke2/rke2.yaml
  tasks:
    - name: Wait for mzcl01-w3 to be Ready
      ansible.builtin.command: >
        {{ kube }} --kubeconfig {{ kubeconfig }} get node mzcl01-w3
        -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: w3_ready
      until: w3_ready.stdout == 'True'
      retries: 30
      delay: 10
      changed_when: false

    - name: Wait for mzcl01-sllogin1 to be Ready
      ansible.builtin.command: >
        {{ kube }} --kubeconfig {{ kubeconfig }} get node mzcl01-sllogin1
        -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: login_ready
      until: login_ready.stdout == 'True'
      retries: 30
      delay: 10
      changed_when: false

    - name: Show all nodes
      ansible.builtin.command: "{{ kube }} --kubeconfig {{ kubeconfig }} get nodes -o wide"
      register: nodes_out
      changed_when: false

    - ansible.builtin.debug:
        msg: "{{ nodes_out.stdout_lines }}"


- name: "03b-5 | Label and taint mzcl01-sllogin1 as dedicated slurm-login node"
  hosts: control_plane
  gather_facts: false
  vars:
    kube: /var/lib/rancher/rke2/bin/kubectl
    kubeconfig: /etc/rancher/rke2/rke2.yaml
  tasks:
    - name: Label sllogin1 as slurm-login dedicated node
      ansible.builtin.command: >
        {{ kube }} --kubeconfig {{ kubeconfig }} label node mzcl01-sllogin1
        node-role.kubernetes.io/slurm-login=true
        slinky.io/role=slurm-login
        --overwrite
      changed_when: true

    - name: Taint sllogin1 — only slurm-login pods may schedule here
      ansible.builtin.command: >
        {{ kube }} --kubeconfig {{ kubeconfig }} taint node mzcl01-sllogin1
        dedicated=slurm-login:NoSchedule
        --overwrite
      changed_when: true

    - name: Confirm node labels and taints
      ansible.builtin.command: >
        {{ kube }} --kubeconfig {{ kubeconfig }} get node mzcl01-sllogin1
        -o jsonpath='{.metadata.labels}  TAINTS: {.spec.taints}'
      register: node_info
      changed_when: false

    - ansible.builtin.debug:
        msg: "{{ node_info.stdout }}"
