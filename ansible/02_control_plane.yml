#!/usr/bin/env -S ansible-playbook -vv
---
# Phase 02 — Kubernetes Control Plane (kubeadm)
# Steps: system-prep → containerd → k8s-packages → kubeadm-init → flannel → export-creds

- name: "02-1 | System prep — control plane"
  hosts: control_plane
  gather_facts: true
  tasks:
    - name: Disable swap (runtime)
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap entries from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '.*\bswap\b.*'
        state: absent

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop: [overlay, br_netfilter]

    - name: Persist kernel modules across reboots
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: "overlay\nbr_netfilter\n"
        mode: '0644'

    - name: Apply sysctl settings for Kubernetes
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-k8s.conf
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward,                 value: "1" }


- name: "02-2 | Install containerd"
  hosts: control_plane
  gather_facts: true
  tasks:
    - name: Install apt prerequisites
      ansible.builtin.apt:
        name: [ca-certificates, curl, gnupg, apt-transport-https]
        state: present
        update_cache: true

    - name: Create /etc/apt/keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key (containerd source)
      ansible.builtin.shell:
        cmd: >
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.list
        content: >
          deb [arch={{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}
          signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/ubuntu noble stable
        mode: '0644'

    - name: Install containerd.io
      ansible.builtin.apt:
        name: containerd.io
        state: present
        update_cache: true

    - name: Generate default containerd config
      ansible.builtin.shell:
        cmd: containerd config default > /etc/containerd/config.toml
      changed_when: true

    - name: Enable SystemdCgroup in containerd config
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Enable and restart containerd
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: restarted


- name: "02-3 | Install kubeadm, kubelet, kubectl"
  hosts: control_plane
  gather_facts: false
  vars:
    k8s_minor: "{{ k8s_version.split('.')[:2] | join('.') }}"
  tasks:
    - name: Add Kubernetes GPG key
      ansible.builtin.shell:
        cmd: >
          curl -fsSL
          https://pkgs.k8s.io/core:/stable:/v{{ k8s_minor }}/deb/Release.key
          | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: >
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg]
          https://pkgs.k8s.io/core:/stable:/v{{ k8s_minor }}/deb/ /
        mode: '0644'

    - name: Install kubelet, kubeadm, kubectl
      ansible.builtin.apt:
        name: [kubelet, kubeadm, kubectl]
        state: present
        update_cache: true

    - name: Hold Kubernetes packages at installed version
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: [kubelet, kubeadm, kubectl]

    - name: Enable kubelet
      ansible.builtin.systemd:
        name: kubelet
        enabled: true


- name: "02-4 | kubeadm init, Flannel CNI, export join command"
  hosts: control_plane
  gather_facts: true
  tasks:
    - name: Check if cluster already initialised
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: admin_conf

    - name: Ensure /root/.kube exists
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: '0700'

    - name: Run kubeadm init
      ansible.builtin.command: >
        kubeadm init
        --apiserver-advertise-address={{ ansible_lima0.ipv4.address }}
        --pod-network-cidr={{ pod_cidr }}
        --service-cidr={{ service_cidr }}
        --node-name=mzcl01-cp
      when: not admin_conf.stat.exists
      register: kubeadm_init
      changed_when: true

    - ansible.builtin.debug:
        msg: "{{ kubeadm_init.stdout_lines | default(['already initialised']) }}"

    - name: Copy admin.conf to /root/.kube/config
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: '0600'

    - name: Install Flannel CNI
      ansible.builtin.command: >
        kubectl --kubeconfig /etc/kubernetes/admin.conf apply -f
        https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      register: flannel_out
      changed_when: "'created' in flannel_out.stdout or 'configured' in flannel_out.stdout"

    - name: Wait for control-plane node to become Ready (up to 4 min)
      ansible.builtin.command: >
        kubectl --kubeconfig /etc/kubernetes/admin.conf
        get node mzcl01-cp
        -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: cp_ready
      until: cp_ready.stdout == 'True'
      retries: 24
      delay: 10
      changed_when: false

    - name: Generate worker join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_cmd
      changed_when: false

    - name: Save join vars to output dir (for phase 03)
      ansible.builtin.copy:
        dest: "{{ output_dir }}/k8s_join_vars.yml"
        mode: '0600'
        content: |
          k8s_join_command: "{{ join_cmd.stdout }}"
          k8s_cp_ip: "{{ ansible_lima0.ipv4.address }}"
      delegate_to: localhost
      become: false

    - name: Fetch kubeconfig from control plane
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: "{{ output_dir }}/k8s-admin.conf"
        flat: true


- name: "02-5 | Set up kubeconfig on macOS host"
  hosts: localhost
  gather_facts: false
  become: false
  tasks:
    - name: Ensure output dir exists
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        mode: '0755'

    - name: Load CP IP from join vars
      ansible.builtin.include_vars:
        file: "{{ output_dir }}/k8s_join_vars.yml"

    - name: Ensure ~/.kube directory exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.kube"
        state: directory
        mode: '0700'

    - name: Replace loopback with CP IP in kubeconfig
      ansible.builtin.replace:
        path: "{{ output_dir }}/k8s-admin.conf"
        regexp: 'server: https://127\.0\.0\.1:6443'
        replace: "server: https://{{ k8s_cp_ip }}:6443"

    - name: Write kubeconfig to ~/.kube/k8s-local.yaml
      ansible.builtin.copy:
        src: "{{ output_dir }}/k8s-admin.conf"
        dest: "{{ kubeconfig }}"
        mode: '0600'

    - name: Verify cluster is reachable from host
      ansible.builtin.command: kubectl --kubeconfig {{ kubeconfig }} get nodes -o wide
      register: nodes_out
      changed_when: false

    - ansible.builtin.debug:
        msg: "{{ nodes_out.stdout_lines }}"
